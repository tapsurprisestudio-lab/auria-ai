<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — AURIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/app.css">
  <style>
    .chat-container .background-layer { display: none; }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <a href="../index.html" class="nav-logo">
      <img src="https://i.imgur.com/vtzAk7r.jpeg" alt="AURIA">
      AURIA
    </a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="chat.html" class="active">Chat</a></li>
      <li><a href="mood.html">Mood</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="what.html">What AURIA Does</a></li>
      <li><a href="history.html">History</a></li>
      <li><a href="settings.html">Settings</a></li>
    </ul>
    <button class="nav-burger" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>
  
  <!-- Mobile Nav -->
  <div class="nav-mobile">
    <a href="../index.html">Home</a>
    <a href="chat.html">Chat</a>
    <a href="mood.html">Mood</a>
    <a href="about.html">About</a>
    <a href="what.html">What AURIA Does</a>
    <a href="history.html">History</a>
    <a href="settings.html">Settings</a>
  </div>

  <!-- Background for Chat -->
  <div class="background-layer chat-bg"></div>

  <style>
    @media (max-width: 768px) {
      .chat-bg { background-image: url('https://i.imgur.com/RTkwPYd.jpeg') !important; }
    }
    @media (min-width: 769px) {
      .chat-bg { background-image: url('https://i.imgur.com/F4sx2S1.jpeg') !important; }
    }
  </style>

  <!-- Main Content -->
  <main class="main-content">
    <div class="chat-container">
      <div class="chat-header">
        <div class="chat-header-info">
          <img src="https://i.imgur.com/vtzAk7r.jpeg" alt="AURIA" class="chat-avatar">
          <div class="chat-header-text">
            <h3>AURIA</h3>
            <p>Calm companion</p>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm focus-mode-btn">Focus Mode</button>
      </div>
      
      <div class="chat-messages">
        <!-- Messages will be inserted here by JavaScript -->
      </div>
      
      <div class="chat-input-area">
        <input type="text" class="form-input chat-input" placeholder="Share what's on your mind...">
        <button class="btn btn-primary chat-send-btn">Send</button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    AURIA — calm companion
  </footer>

  <script src="../js/app.js"></script>
  <script>
    // Set background after page loads
    document.addEventListener('DOMContentLoaded', function() {
      const bg = document.querySelector('.chat-bg');
      if (window.innerWidth <= 768) {
        bg.style.backgroundImage = "url('https://i.imgur.com/RTkwPYd.jpeg')";
      } else {
        bg.style.backgroundImage = "url('https://i.imgur.com/F4sx2S1.jpeg')";
      }
    });
  </script>
</body>
</html>
