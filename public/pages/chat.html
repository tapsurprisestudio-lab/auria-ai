<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AURIA Chat</title>

<link rel="stylesheet" href="../css/app.css">

<style>

.chat-layout{
display:flex;
height:100vh;
}

.sidebar{
width:250px;
background:#111827;
padding:20px;
display:flex;
flex-direction:column;
}

.sidebar button{
margin-bottom:10px;
}

.chat-area{
flex:1;
display:flex;
flex-direction:column;
}

.chat-messages{
flex:1;
overflow-y:auto;
padding:20px;
}

</style>

</head>

<body>

<div class="background-layer chat-bg"></div>

<div class="chat-layout">

<div class="sidebar">

<h2>AURIA</h2>

<button onclick="showChat()">Chat</button>

<button onclick="showHistory()">History</button>

<button onclick="showSettings()">Settings</button>

<button onclick="logout()">Logout</button>

</div>

<div class="chat-area">

<div class="chat-header">

<h3>AURIA</h3>

</div>

<div class="chat-messages" id="chatMessages"></div>

<div class="chat-input-area">

<input type="text"
class="form-input chat-input"
placeholder="Share what's on your mind..."
>

<button class="chat-send-btn">
Send
</button>

</div>

</div>

</div>

<script src="../js/app.js"></script>

<script>

/*
CHECK LOGIN
*/

const user = localStorage.getItem("auria_user_name");

if(!user){

window.location.href="login.html";

}

/*
SIDEBAR FUNCTIONS
*/

function showChat(){

document.getElementById("chatMessages").innerHTML="";

}

function showHistory(){

const chats = JSON.parse(localStorage.getItem("auria_conversations")) || [];

let html="<h3>Conversation History</h3>";

chats.forEach(c=>{
html += `<p>${c.message}</p>`;
});

document.getElementById("chatMessages").innerHTML=html;

}

function showSettings(){

document.getElementById("chatMessages").innerHTML=`

<h3>Settings</h3>

<button onclick="toggleComfort()">Comfort Mode</button>

<button onclick="logout()">Logout</button>

`;

}

function toggleComfort(){

document.body.classList.toggle("comfort");

}

function logout(){

localStorage.removeItem("auria_user_name");

window.location.href="login.html";

}

</script>

</body>
</html>
