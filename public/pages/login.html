<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login — AURIA</title>

<link rel="stylesheet" href="../css/app.css">

<style>

.login-box{
max-width:400px;
margin:auto;
margin-top:120px;
text-align:center;
}

</style>

</head>

<body>

<div class="background-layer"></div>

<div class="login-box">

<h2>Login</h2>

<input id="name"
class="form-input"
placeholder="Your name">

<button onclick="login()">
Enter
</button>

</div>

<script>

function login(){

const name=document.getElementById("name").value;

if(!name) return;

localStorage.setItem("auria_user_name",name);

window.location.href="chat.html";

}

</script>

</body>
</html>
