<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AURIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/app.css">
  <style>
    .nav, .footer { display: none; }
  </style>
</head>
<body>
  <div class="background-layer" style="background-image: url('https://i.imgur.com/4WtXKe6.jpeg');"></div>

  <div class="auth-container">
    <div class="glass-card auth-card animate-fade-in">
      <div class="auth-header">
        <div class="auth-logo">
          <img src="https://i.imgur.com/vtzAk7r.jpeg" alt="AURIA">
          <span>AURIA</span>
        </div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to continue your journey</p>
      </div>
      
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label class="form-label" for="login-name">Your Name</label>
          <input type="text" id="login-name" class="form-input" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary">Sign In</button>
      </form>
      
      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
</body>
</html>
